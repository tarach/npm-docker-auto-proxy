name: Build

on:
  push:
    tags:
      - 'v*'

env:
  BINARY_NAME: npm-docker-auto-proxy
  DOCKER_IMAGE: tarach/npm-docker-auto-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build executable
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -o "${{ env.BINARY_NAME }}" \
            ./cmd/npm-docker-auto-proxy

      - name: Generate checksums
        run: |
          sha1sum "${{ env.BINARY_NAME }}" > "${{ env.BINARY_NAME }}.sha1"
          sha256sum "${{ env.BINARY_NAME }}" > "${{ env.BINARY_NAME }}.sha256"
          openssl dgst -sha384 -r "${{ env.BINARY_NAME }}" | awk '{print $1 "  '"${{ env.BINARY_NAME }}"'"}' > "${{ env.BINARY_NAME }}.sha384"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t "${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}" .

      - name: Push Docker image
        run: docker push "${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}"

      - name: Tag and push latest Docker image
        run: |
          docker tag "${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}" "${{ env.DOCKER_IMAGE }}:latest"
          docker push "${{ env.DOCKER_IMAGE }}:latest"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.sha1
            ${{ env.BINARY_NAME }}.sha256
            ${{ env.BINARY_NAME }}.sha384

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}
            ${{ env.BINARY_NAME }}.sha1
            ${{ env.BINARY_NAME }}.sha256
            ${{ env.BINARY_NAME }}.sha384
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
